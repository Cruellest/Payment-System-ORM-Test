services:
  app:
    container_name: payment_system
    image: python:3.10-alpine3.20
    ports:
      - "5001:5001"
    expose:
      - "5001"
    working_dir: /home/src/
    volumes:
      - ./src/:/home/src/
    env_file:
      - .env
    networks:
      - teia  
    command: ./entrypoint.sh  # tail -f /dev/null >> Deixa o container rodando
    depends_on:
      db_mysql:
        condition: service_healthy
      # db_postgresql:
      #   condition: service_healthy
    
  db_mysql:
    container_name: db_mysql
    image: mysql:latest
    restart: always
    ports:
      - 3306:3306
    expose:
      - "3306"
    env_file:
      - .env
    # volumes:
      # - ./db/mysql/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    networks:
      - teia
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h mysql -u root --password=$MYSQL_ROOT_PASSWORD",
        ]
      interval: 10s
      timeout: 10s
      retries: 5

  gui_pma:
    container_name: gui_pma
    image: phpmyadmin
    ports:
      - 8080:80
    env_file:
      - .env
    volumes:
      - ./db/mysql/phpmyadmin/apache_custom.conf:/etc/apache2/sites-available/000-default.conf
    networks:
      - teia
    depends_on:
      db_mysql:
        condition: service_healthy

